<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EduBook</title>
  <link rel="stylesheet" href="css/login.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <i class="fas fa-graduation-cap"></i>
      <h2>Welcome Back</h2>
      <p>Login to manage your appointments</p>
    </div>
    
    <div class="auth-form">
      
      <div class="role-selector">
        <input type="radio" name="role" id="role-student" value="student" checked>
        <label for="role-student" class="role-tab">Student</label>

        <input type="radio" name="role" id="role-teacher" value="teacher">
        <label for="role-teacher" class="role-tab">Teacher</label>
      </div>

      <div class="input-field">
        <i class="fas fa-envelope"></i>
        <input type="email" id="loginEmail" placeholder="Email Address" autocomplete="email" oninput="this.value = this.value.toLowerCase()">
      </div>
      
      <div class="input-field" style="position: relative;">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPassword" placeholder="Password" style="padding-right: 40px;">
        <i class="fas fa-eye-slash" onclick="togglePassword('loginPassword', this)" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #94a3b8; transition: 0.3s; width: auto;" onmouseover="this.style.color='#16a34a'" onmouseout="this.style.color='#94a3b8'"></i>
      </div>

      <button onclick="login()" class="auth-btn"><i class="fas fa-arrow-right-to-bracket"></i> Login</button>
      <div id="loginMessage" class="error-message"></div>
    </div>
    
    <div class="auth-footer">
      <p>New to EduBook? <a href="register.html">Create an account</a></p>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="js/script.js"></script>
</body>
</html>
